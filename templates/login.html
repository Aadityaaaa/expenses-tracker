{% extends "layout.html" %}

{% block title %}
    register
{% endblock %}

{% block main %}
    <div class="form-container" id="login-page">

        <form action="/login" method="post">
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Username</label>
                <input autocomplete="off" autofocus name="username" type="text" class="form-control" id="exampleInputPassword1">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input autocomplete="off" autofocus name="password" required type="password" class="form-control" id="exampleInputPassword1">
            </div>
            <button type="submit" class="btn btn-primary">Log in</button>

        </div>
{% endblock %}
